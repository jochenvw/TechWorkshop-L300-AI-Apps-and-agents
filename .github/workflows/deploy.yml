name: Build, Push, Deploy (Azure Container Apps)

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: kfnrynfw4y5lmcosureg.azurecr.io
  ACR_REPOSITORY: chat-app
  CONTAINERAPP_NAME: kfnrynfw4y5lm-cosu-cae
  RESOURCE_GROUP: rg-nl-stu-jvw-mandatory-course

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Parse ENV secret into individual environment variables
      - name: Load ENV secret
        run: |
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done <<< "${{ secrets.ENV }}"

      # Build credentials JSON and login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ env.AZURE_CLIENT_ID }}","clientSecret":"${{ env.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ env.AZURE_TENANT_ID }}"}'

      # Build & push with src/ as the build context (ONLY files in src are sent to Docker)
      - name: Build and Push image to ACR
        run: |
          az acr login --name "${{ env.ACR_LOGIN_SERVER }}"
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}"
          docker build -f Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
        working-directory: src

      - name: Deploy to Azure Container App (set env vars + image)
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}"

          az containerapp update \
            --name "${{ env.CONTAINERAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ env.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ env.GPT_ENDPOINT }}" \
              embedding_endpoint="${{ env.EMBEDDING_ENDPOINT }}" \
              phi_4_endpoint="${{ env.PHI_4_ENDPOINT }}"
