name: Deploy Cart Manager Agent

on:
  push:
    branches: [main]
    paths:
      - 'src/infra/agents/cart-manager.json'
      - 'src/prompts/CartManagerPrompt.txt'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load ENV secret
        run: |
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done <<< "${{ secrets.ENV }}"

      - name: Azure Login
        uses: azure/login@v2.1.1
        with:
          creds: '{"clientId":"${{ env.AZURE_CLIENT_ID }}","clientSecret":"${{ env.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ env.AZURE_TENANT_ID }}"}'

      - name: JSON-escape prompt instructions
        id: escape
        run: |
          ESCAPED=$(python3 -c "import json; print(json.dumps(open('src/prompts/CartManagerPrompt.txt').read()))")
          echo "instructions=${ESCAPED}" >> "$GITHUB_OUTPUT"

      - name: Substitute placeholders in agent definition
        run: |
          jq --arg model "${{ env.GPT_DEPLOYMENT }}" \
             --argjson instructions '${{ steps.escape.outputs.instructions }}' \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/cart-manager.json > /tmp/agent-payload.json
          cat /tmp/agent-payload.json

      - name: Deploy agent version to Foundry
        run: |
          az rest --method POST \
            --url "${{ env.FOUNDRY_ENDPOINT }}/agents/cart-manager/versions?api-version=2025-11-15-preview" \
            --resource "https://ai.azure.com" \
            --body @/tmp/agent-payload.json
