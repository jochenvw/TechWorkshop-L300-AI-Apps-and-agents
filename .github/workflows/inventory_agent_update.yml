name: Deploy Inventory Agent

on:
  push:
    branches: [main]
    paths:
      - 'src/infra/agents/inventory-agent.json'
      - 'src/prompts/InventoryAgentPrompt.txt'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load ENV secret
        run: |
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done <<< "${{ secrets.ENV }}"

      - name: Azure Login
        uses: azure/login@v2.1.1
        with:
          creds: '{"clientId":"${{ env.AZURE_CLIENT_ID }}","clientSecret":"${{ env.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ env.AZURE_TENANT_ID }}"}'

      - name: Build agent payload
        run: |
          python3 -c "
          import json, os
          instructions = open('src/prompts/InventoryAgentPrompt.txt').read()
          with open('src/infra/agents/inventory-agent.json') as f:
              payload = json.load(f)
          payload['definition']['model'] = os.environ['GPT_DEPLOYMENT']
          payload['definition']['instructions'] = instructions
          with open('/tmp/agent-payload.json', 'w') as f:
              json.dump(payload, f, indent=2)
          "
          cat /tmp/agent-payload.json

      - name: Deploy agent version to Foundry
        run: |
          az rest --method POST \
            --url "${{ env.FOUNDRY_ENDPOINT }}/agents/inventory-agent/versions?api-version=2025-11-15-preview" \
            --resource "https://ai.azure.com" \
            --body @/tmp/agent-payload.json
